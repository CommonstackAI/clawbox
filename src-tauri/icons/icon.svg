  <!-- Table grid -->
  <g transform="translate(156, 156)">
    <!-- Outer border -->
    <rect x="0" y="0" width="200" height="200" fill="white" rx="8"/>
    
    <!-- Grid lines -->
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="200" y2="50" stroke="#3b82f6" stroke-width="4"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#3b82f6" stroke-width="4"/>
